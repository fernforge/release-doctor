name: 'release-doctor'
description: 'Check that your npm/PyPI publish CI is ready for OIDC trusted publishing, after npm revoked classic tokens.'
author: 'fernforge'
branding:
  icon: 'check-circle'
  color: 'green'
inputs:
  path:
    description: 'Directory to scan (defaults to the repo root).'
    required: false
    default: '.'
  strict:
    description: 'Fail the job on warnings as well as errors.'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - shell: bash
      env:
        RD_PATH: ${{ inputs.path }}
        RD_STRICT: ${{ inputs.strict }}
      run: |
        args=("$RD_PATH" "--no-color")
        if [ "$RD_STRICT" = "true" ]; then args+=("--strict"); fi
        npx -y release-doctor@latest "${args[@]}"
